services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    pull_policy: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-boxleague}
      POSTGRES_USER: ${POSTGRES_USER:-boxleague}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-boxleague}
    volumes:
      - ${POSTGRES_DATA_PATH:-/mnt/user/appdata/box-league/postgres}:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_HOST_PORT:-15435}:5432"

  web:
    build:
      context: ${GIT_CONTEXT:-https://github.com/sefaction/sealed-commander-league.git#main}
      dockerfile: ${DOCKERFILE_PATH:-./Dockerfile}
    pull_policy: build
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://boxleague:boxleague@postgres:5432/boxleague?schema=public}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Box League}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-admin123}
      NODE_ENV: production
    depends_on:
      - postgres
    ports:
      - "${WEB_HOST_PORT:-13001}:3000"
